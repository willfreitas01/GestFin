kind = "web"
previewPath = "/"
title = "FinControl"
version = "1.0.0"
id = "artifacts/fincontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20587

[services.development]
run = "pnpm --filter @workspace/fincontrol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fincontrol", "run", "build" ]
publicDir = "artifacts/fincontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20587"
BASE_PATH = "/"

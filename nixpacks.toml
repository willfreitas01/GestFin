[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@10 && /root/.npm-global/bin/pnpm install --no-frozen-lockfile || $(npm root -g)/pnpm/bin/pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["$(npm root -g)/.bin/pnpm --filter @workspace/api-server build || npx pnpm --filter @workspace/api-server build"]

[start]
cmd = "npx pnpm --filter @workspace/api-server start"
